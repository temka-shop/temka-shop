<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T&E АДМИН ПАНЕЛЬ (Захиалга хянах)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f8fafc;
            padding: 12px;
            color: #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Нэвтрэх хэсгийн загвар */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .login-box {
            background: white;
            padding: 30px 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }
        .login-box h3 { margin-bottom: 15px; font-weight: 800; color: #1e293b; }
        .login-box input {
            width: 100%; padding: 12px; border: 1px solid #e2e8f0;
            border-radius: 10px; margin-bottom: 15px; outline: none;
            font-size: 16px; text-align: center; background: #f8fafc;
        }
        .login-box input:focus { border-color: #1e293b; background: white; }
        .btn-login {
            background: #1e293b; color: white; border: none;
            padding: 12px; width: 100%; border-radius: 10px;
            font-size: 15px; font-weight: bold; cursor: pointer;
        }

        /* Үндсэн админ хэсэг (Нууц үг зөв үед харагдана) */
        .admin-main-content {
            display: none; /* Нууц үг хийтэл нууц байна */
            width: 100%;
            max-width: 500px;
        }

        .admin-box {
            background-color: white;
            padding: 20px;
            border-radius: 16px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 10px;
        }

        .back-link {
            color: #b45309;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 15px;
        }

        h2 {
            font-size: 20px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 20px;
            display: inline-block;
            margin-left: 5px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            background-color: #f8fafc;
            color: #334155;
            outline: none;
        }

        .form-group input:focus {
            border-color: #1e293b;
            background-color: white;
        }

        .file-input-wrapper {
            background-color: #f1f5f9;
            border: 2px dashed #cbd5e1;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            position: relative;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0; top: 0; opacity: 0;
            width: 100%; height: 100%; cursor: pointer;
        }
        .preview-thumbnail {
            max-width: 100px; max-height: 100px;
            margin-top: 10px; border-radius: 8px;
            display: none; object-fit: cover;
        }

        .btn-add {
            background-color: #1e293b; color: white; border: none;
            padding: 14px; width: 100%; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            margin-top: 10px; display: flex; justify-content: center; align-items: center;
        }

        .section-title {
            font-size: 16px; font-weight: 800; color: #1e293b;
            margin: 25px 0 12px 0; width: 100%; text-align: left;
        }

        .product-list, .order-list { width: 100%; }

        .admin-prod-card, .order-card {
            background: white; border: 1px solid #e2e8f0; border-radius: 12px;
            padding: 12px; margin-bottom: 10px; display: flex;
            align-items: center; justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .admin-prod-card img {
            width: 60px; height: 60px; object-fit: cover;
            border-radius: 8px; margin-right: 12px;
        }

        .prod-info, .order-info { flex-grow: 1; text-align: left; }
        .prod-name, .order-title { font-size: 14px; font-weight: 700; color: #1e293b; }
        .prod-price, .order-sub { font-size: 13px; font-weight: 700; color: #ef4444; margin-top: 2px; }
        
        .stats-container { margin-top: 5px; display: flex; gap: 10px; }
        .stat-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; }
        .stat-views { background-color: #e0f2fe; color: #0369a1; }
        .stat-orders { background-color: #fef3c7; color: #b45309; }

        .btn-delete {
            background-color: #fee2e2; color: #ef4444; border: none;
            padding: 8px 12px; border-radius: 8px; font-size: 12px;
            font-weight: 700; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h3>🔒 ТЭМҮҮЖИН АДМИН</h3>
            <input type="password" id="adminPasswordInput" placeholder="Нэвтрэх код оруулна уу...">
            <button class="btn-login" onclick="window.checkAdminPassword()">Нэвтрэх</button>
        </div>
    </div>

    <div id="adminMainContent" class="admin-main-content">
        <div class="admin-box">
            <a href="index.html" class="back-link">← Буцах</a>
            <h2>T&E АДМИН ПАНЕЛЬ</h2>

            <div class="form-group">
                <label>Бүтээгдэхүүний зураг оруулах</label>
                <div class="file-input-wrapper">
                    <span id="uploadStatusText">📁 Зураг сонгох уу, эсвэл чирч орхино уу</span>
                    <input type="file" id="prodImageFile" accept="image/*" onchange="window.handleImageSelect(this)">
                    <center><img id="imagePreview" class="preview-thumbnail" alt="Урьдчилсан харагдац"></center>
                </div>
            </div>

            <div class="form-group">
                <label>Бүтээгдэхүүний нэр</label>
                <input type="text" id="prodName" placeholder="Нэр оруулах...">
            </div>

            <div class="form-group">
                <label>Бүтээгдэхүүний үнэ</label>
                <input type="text" id="prodPrice" placeholder="Үнээ оруулах... (Жишээ нь: 45,000)">
            </div>

            <button class="btn-add" id="btnAddProduct" onclick="window.addProduct()">＋ Шинэ бараа нэмэх</button>
        </div>

        <div class="section-title">🛒 Ирсэн бодит захиалгууд (Утасны дугаар)</div>
        <div class="order-list" id="adminOrderList">
            <p style="color:#64748b; font-size:14px; text-align:center; padding: 15px; background: white; border-radius:12px; border: 1px solid #e2e8f0;">Шинэ захиалга байхгүй байна...</p>
        </div>

        <div class="section-title">📊 Барааны хандалт & Статистик</div>
        <div class="product-list" id="adminProductList">
            <p style="color:#64748b; font-size:14px; text-align:center; padding: 20px; background: white; border-radius:12px; border: 1px solid #e2e8f0;">Ачаалж байна...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7htpIxGtVfJ0HGd7-8DVXtwGwj2mHlOQ",
            authDomain: "temka-shop.firebaseapp.com",
            databaseURL: "https://temka-shop-default-rtdb.firebaseio.com",
            projectId: "temka-shop",
            storageBucket: "temka-shop.firebasestorage.app",
            messagingSenderId: "1057963752042",
            appId: "1:1057963752042:web:9e0c88d308ac1cc9c92813",
            measurementId: "G-9H3NQML5TV"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        let selectedBase64Image = "";

        // ХУУДАС АЧААЛАГДАХАД НУУЦ ҮГ ШАЛГАХ
        window.addEventListener('DOMContentLoaded', (event) => {
            // Өмнө нь зөв нэвтэрсэн бол шууд оруулна
            if(localStorage.getItem("admin_authenticated") === "true") {
                showAdminPanel();
            }
            
            // Энтер дарахад нэвтэрдэг болгох
            document.getElementById("adminPasswordInput").addEventListener("keyup", function(event) {
                if (event.key === "Enter") { window.checkAdminPassword(); }
            });
        });

        // НҮҮЦ ҮГ ШАЛГАХ ФУНКЦ
        window.checkAdminPassword = function() {
            var enteredPass = document.getElementById("adminPasswordInput").value;
            var correctPass = "20110917@"; // Таны хэлсэн нууц үг

            if(enteredPass === correctPass) {
                localStorage.setItem("admin_authenticated", "true"); // Хөтөч дээр сануулах
                showAdminPanel();
            } else {
                alert("❌ Нууц үг буруу байна! Дахин оролдоно уу.");
                document.getElementById("adminPasswordInput").value = "";
            }
        };

        function showAdminPanel() {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("adminMainContent").style.display = "block";
            loadProducts();
            loadOrders();
        }

        window.handleImageSelect = function(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    selectedBase64Image = e.target.result;
                    var preview = document.getElementById("imagePreview");
                    preview.src = selectedBase64Image;
                    preview.style.display = "block";
                    document.getElementById("uploadStatusText").innerText = "✅ Зураг бэлэн боллоо!";
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        function loadProducts() {
            var listDiv = document.getElementById("adminProductList");
            database.ref('products').on('value', function(snapshot) {
                listDiv.innerHTML = "";
                if (!snapshot.exists()) {
                    listDiv.innerHTML = "<p style='color:#64748b; text-align:center; padding:20px; background:white; border-radius:12px;'>Бараа байхгүй.</p>";
                    return;
                }
                snapshot.forEach(function(childSnapshot) {
                    var prodId = childSnapshot.key;
                    var prod = childSnapshot.val();
                    var views = prod.views || 0;
                    var orders = prod.orders || 0;
                    var numericPrice = parseInt(prod.price ? prod.price.toString().replace(/[^0-9]/g, '') : 0) || 0;

                    var row = document.createElement("div");
                    row.className = "admin-prod-card";
                    row.innerHTML = 
                        '<img src="' + (prod.image || 'https://via.placeholder.com/60') + '" alt="">' +
                        '<div class="prod-info">' +
                            '<div class="prod-name">' + prod.name + '</div>' +
                            '<div class="prod-price">' + numericPrice.toLocaleString() + '₮</div>' +
                            '<div class="stats-container">' +
                                '<span class="stat-badge stat-views">👀 Үзсэн: ' + views + '</span>' +
                                '<span class="stat-badge stat-orders">🛒 Захиалга: ' + orders + '</span>' +
                            '</div>' +
                        '</div>' +
                        '<button class="btn-delete" onclick="window.deleteProduct(\'' + prodId + '\')">Устгах</button>';
                    listDiv.appendChild(row);
                });
            });
        }

        function loadOrders() {
            var orderDiv = document.getElementById("adminOrderList");
            database.ref('orders').on('value', function(snapshot) {
                orderDiv.innerHTML = "";
                if (!snapshot.exists()) {
                    orderDiv.innerHTML = "<p style='color:#64748b; text-align:center; padding:15px; background:white; border-radius:12px;'>Шинэ захиалга байхгүй байна...</p>";
                    return;
                }
                snapshot.forEach(function(childSnapshot) {
                    var orderId = childSnapshot.key;
                    var order = childSnapshot.val();

                    var card = document.createElement("div");
                    card.className = "order-card";
                    card.innerHTML = 
                        '<div class="order-info">' +
                            '<div class="order-title">📞 Утас: ' + order.phone + '</div>' +
                            '<div class="order-sub">📦 Бараа: ' + order.productName + ' | Код: ' + (order.orderCode || 'Байхгүй') + '</div>' +
                        '</div>' +
                        '<button class="btn-delete" style="background:#d1fae5; color:#065f46;" onclick="window.completeOrder(\'' + orderId + '\')">Хүргэсэн</button>';
                    orderDiv.appendChild(card);
                });
            });
        }

        window.addProduct = function() {
            var name = document.getElementById("prodName").value.trim();
            var price = document.getElementById("prodPrice").value.trim();
            var btn = document.getElementById("btnAddProduct");

            if (!selectedBase64Image) {
                alert("Барааны зургийг сонгож оруулна уу!");
                return;
            }
            if (!name || !price) {
                alert("Нэр болон үнийг оруулна уу!");
                return;
            }

            btn.innerText = "Уншиж байна...";
            btn.disabled = true;

            var numericPrice = parseInt(price.replace(/[^0-9]/g, '')) || 0;

            database.ref('products').push({
                image: selectedBase64Image,
                name: name,
                price: numericPrice,
                views: 0,
                orders: 0
            }).then(function() {
                alert("Бараа амжилттай нэмэгдлээ!");
                document.getElementById("prodImageFile").value = "";
                document.getElementById("imagePreview").style.display = "none";
                document.getElementById("uploadStatusText").innerText = "📁 Зураг сонгох уу, эсвэл чирч орхино уу";
                document.getElementById("prodName").value = "";
                document.getElementById("prodPrice").value = "";
                selectedBase64Image = "";
            }).catch(function(err) {
                alert("Алдаа гарлаа: " + err.message);
            }).finally(function() {
                btn.innerText = "＋ Шинэ бараа нэмэх";
                btn.disabled = false;
            });
        };

        // УСТГАХ ФУНКЦҮҮД (window глобал дуудалтыг засав)
        window.deleteProduct = function(prodId) {
            if (confirm("Устгах уу?")) {
                database.ref('products/' + prodId).remove();
            }
        };

        window.completeOrder = function(orderId) {
            if (confirm("Энэ захиалгыг хүргэж дуусгасан тул устгах уу?")) {
                database.ref('orders/' + orderId).remove()
                .then(function() {
                    alert("Захиалга амжилттай хаагдлаа! 🤝");
                })
                .catch(function(err) {
                    alert("Алдаа гарлаа: " + err.message);
                });
            }
        };
    </script>
</body>
</html>
