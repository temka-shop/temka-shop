<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T&S АДМИН ПАНЕЛЬ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #060709; 
            color: #ffffff; 
            padding: 20px 4% 50px 4%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Нэвтрэх цонх */
        .login-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #060709; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
        }
        .login-box { 
            background: #0d1117; 
            border: 1px solid #21262d; 
            padding: 30px 24px; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
        }
        .login-box h3 { margin-bottom: 15px; font-weight: 800; color: #ffffff; font-size: 18px; }
        .login-box input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #21262d; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            outline: none; 
            font-size: 16px; 
            text-align: center; 
            background: #060709; 
            color: #ffffff; 
        }
        .login-box input:focus { border-color: #8b5cf6; }
        .btn-login { 
            background: #8b5cf6; 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 10px; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .btn-login:hover { background: #7c3aed; }

        /* Үндсэн Админ самбар */
        .admin-main-content { display: none; width: 100%; max-width: 600px; }
        .header-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .btn-back { 
            background: #0d1117; 
            border: 1px solid #21262d; 
            width: 40px; 
            height: 40px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #ffffff; 
            text-decoration: none; 
            font-size: 16px; 
        }
        .btn-back:hover { background: #161b22; }
        h2 { font-size: 20px; font-weight: 800; color: #ffffff; }

        .admin-box { 
            background-color: #0d1117; 
            border: 1px solid #21262d; 
            padding: 20px; 
            border-radius: 20px; 
            width: 100%; 
            margin-bottom: 25px;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: #cbd5e1; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select, .form-group textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #21262d; 
            border-radius: 10px; 
            font-size: 14px; 
            background-color: #060709; 
            color: #ffffff; 
            outline: none; 
            font-family: inherit;
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #8b5cf6; }

        /* Size Checkbox Загвар */
        .size-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: #060709;
            padding: 12px;
            border: 1px solid #21262d;
            border-radius: 10px;
        }
        .size-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #ffffff;
            cursor: pointer;
            background: #161b22;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #30363d;
        }
        .size-item input[type="checkbox"] {
            width: auto;
            accent-color: #8b5cf6;
            cursor: pointer;
        }

        .file-input-wrapper { 
            background-color: #060709; 
            border: 2px dashed #30363d; 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            cursor: pointer; 
            position: relative; 
            color: #8b949e;
            font-size: 13px;
            font-weight: 600;
        }
        .file-input-wrapper input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        /* Зургийн урьдчилан харах жагсаалт */
        .preview-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px; }
        .preview-item { position: relative; width: 70px; height: 70px; }
        .preview-thumbnail { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; border: 1px solid #30363d; }
        .remove-img-btn { 
            position: absolute; 
            top: -6px; 
            right: -6px; 
            background: #ef4444; 
            color: white; 
            border: none; 
            border-radius: 50%; 
            width: 20px; 
            height: 20px; 
            font-size: 11px; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .btn-add { 
            background-color: #8b5cf6; 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: 0.2s;
        }
        .btn-add:hover { background-color: #7c3aed; }

        .section-title { font-size: 16px; font-weight: 800; color: #ffffff; margin: 25px 0 12px 0; width: 100%; text-align: left; display: flex; align-items: center; gap: 8px; }
        
        .product-list, .order-list { width: 100%; }

        /* Картны загвар */
        .admin-prod-card, .order-card { 
            background: #0d1117; 
            border: 1px solid #21262d; 
            border-radius: 16px; 
            padding: 14px; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 12px;
        }

        .order-card { flex-direction: column; align-items: flex-start; }

        .admin-prod-card img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; border: 1px solid #21262d; }
        .prod-info, .order-info { flex-grow: 1; text-align: left; width: 100%; }
        .prod-name { font-size: 14px; font-weight: 700; color: #ffffff; }
        .prod-price { font-size: 14px; font-weight: 800; color: #a78bfa; margin-top: 2px; }
        .prod-desc { font-size: 12px; color: #8b949e; margin-top: 4px; line-height: 1.3; }

        .order-row { font-size: 13px; color: #cbd5e1; margin-bottom: 4px; }
        .order-row b { color: #ffffff; }
        .order-code-badge { background: #161b22; border: 1px solid #30363d; padding: 2px 8px; border-radius: 6px; font-size: 11px; color: #ef4444; font-weight: bold; }

        .stats-container { margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; }
        .stat-badge { font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 6px; }
        .stat-views { background-color: #1e293b; color: #38bdf8; }
        .stat-orders { background-color: #2e1065; color: #c084fc; }
        .stat-category { background-color: #161b22; border: 1px solid #30363d; color: #f59e0b; }
        .stat-status-in { background-color: rgba(16, 185, 129, 0.15); color: #10b981; }
        .stat-status-out { background-color: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .stat-sizes { background-color: #312e81; color: #a5b4fc; }
        .stat-stock { background-color: #065f46; color: #34d399; }

        .prod-actions { display: flex; flex-direction: column; gap: 6px; }

        .btn-edit { 
            background-color: rgba(56, 189, 248, 0.15); 
            color: #38bdf8; 
            border: 1px solid rgba(56, 189, 248, 0.3); 
            padding: 6px 10px; 
            border-radius: 8px; 
            font-size: 11px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .btn-edit:hover { background-color: #38bdf8; color: white; }

        .btn-delete { 
            background-color: rgba(239, 68, 68, 0.15); 
            color: #ef4444; 
            border: 1px solid rgba(239, 68, 68, 0.3); 
            padding: 6px 10px; 
            border-radius: 8px; 
            font-size: 11px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .btn-delete:hover { background-color: #ef4444; color: white; }

        .btn-complete { 
            background-color: rgba(16, 185, 129, 0.15); 
            color: #10b981; 
            border: 1px solid rgba(16, 185, 129, 0.3); 
            padding: 10px 16px; 
            border-radius: 8px; 
            font-size: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 8px; 
            transition: 0.2s;
        }
        .btn-complete:hover { background-color: #10b981; color: white; }

        .empty-text { 
            color:#6e7681; 
            font-size:14px; 
            text-align:center; 
            padding: 25px; 
            background: #0d1117; 
            border-radius:16px; 
            border: 1px solid #21262d; 
            width: 100%;
        }

        /* Edit Modal (Засах цонх) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 20px;
        }
        .modal-box {
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h3 { font-size: 18px; color: #ffffff; }
        .btn-close-modal {
            background: none; border: none; color: #8b949e; font-size: 20px; cursor: pointer;
        }
        .btn-save-edit {
            background: #10b981; color: white; border: none; padding: 12px; width: 100%;
            border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; margin-top: 10px;
        }
        .btn-save-edit:hover { background: #059669; }
    </style>
</head>
<body>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h3>🔒 ТЭМҮҮЖИН АДМИН</h3>
            <input type="password" id="adminPasswordInput" placeholder="Нэвтрэх код оруулна уу...">
            <button class="btn-login" onclick="window.checkAdminPassword()">Нэвтрэх</button>
        </div>
    </div>

    <div id="adminMainContent" class="admin-main-content">
        <div class="header-bar">
            <a href="index.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
            <h2>T&S АДМИН ПАНЕЛЬ</h2>
        </div>

        <div class="admin-box">
            <div class="form-group">
                <label>Бүтээгдэхүүний зургууд оруулах</label>
                <div class="file-input-wrapper">
                    <span id="uploadStatusText">📁 Энд дарж зургуудаа нэмнэ үү</span>
                    <input type="file" id="prodImageFile" accept="image/*" multiple onchange="window.handleImageSelect(this)">
                    <div id="imagePreviewContainer" class="preview-container"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Бүтээгдэхүүний нэр</label>
                <input type="text" id="prodName" placeholder="Жишээ: Хар футболк эсвэл Кроссовк">
            </div>

            <div class="form-group">
                <label>Ангилал сонгох</label>
                <select id="prodCategory">
                    <option value="Гутал">👟 Гутал</option>
                    <option value="Технологи">📱 Технологи</option>
                    <option value="Хувцас">👕 Хувцас</option>
                    <option value="Аксессуар">⌚ Аксессуар</option>
                    <option value="Бусад">📦 Бусад</option>
                </select>
            </div>

            <div class="form-group">
                <label>Бэлэн байгаа хэмжээ (Sizes)</label>
                <div class="size-checkboxes">
                    <label class="size-item"><input type="checkbox" name="prodSize" value="XS"> XS</label>
                    <label class="size-item"><input type="checkbox" name="prodSize" value="S"> S</label>
                    <label class="size-item"><input type="checkbox" name="prodSize" value="M"> M</label>
                    <label class="size-item"><input type="checkbox" name="prodSize" value="L"> L</label>
                    <label class="size-item"><input type="checkbox" name="prodSize" value="XL"> XL</label>
                    <label class="size-item"><input type="checkbox" name="prodSize" value="2XL"> 2XL</label>
                    <label class="size-item"><input type="checkbox" name="prodSize" value="38"> 38</label>
                    <label class="size-item"><input type="checkbox" name="prodSize" value="39"> 39</label>
                    <label class="size-item"><input type="checkbox" name="prodSize" value="40"> 40</label>
                    <label class="size-item"><input type="checkbox" name="prodSize" value="41"> 41</label>
                    <label class="size-item"><input type="checkbox" name="prodSize" value="42"> 42</label>
                    <label class="size-item"><input type="checkbox" name="prodSize" value="43"> 43</label>
                </div>
            </div>

            <div class="form-group">
                <label>Бүтээгдэхүүний үнэ (₮)</label>
                <input type="text" id="prodPrice" placeholder="Жишээ: 45,000">
            </div>

            <div class="form-group">
                <label>Үлдэгдэл тоо (Stock)</label>
                <input type="number" id="prodStock" placeholder="Жишээ: 14" value="14">
            </div>

            <div class="form-group">
                <label>Бүтээгдэхүүний тайлбар</label>
                <textarea id="prodDesc" placeholder="Хэмжээ, материал, онцлог шинжийг энд бичнэ үү..."></textarea>
            </div>

            <div class="form-group">
                <label>Барааны төлөв</label>
                <select id="prodStatus">
                    <option value="in_stock">✅ Бэлэн байгаа</option>
                    <option value="out_of_stock">❌ Дууссан (Out of Stock)</option>
                </select>
            </div>

            <button class="btn-add" id="btnAddProduct" onclick="window.addProduct()">＋ Шинэ бараа нэмэх</button>
        </div>

        <div class="section-title"><i class="fa-solid fa-receipt" style="color: #a78bfa;"></i> Ирсэн бодит захиалгууд</div>
        <div class="order-list" id="adminOrderList">
            <p class="empty-text">Шинэ захиалга байхгүй байна...</p>
        </div>

        <div class="section-title"><i class="fa-solid fa-chart-simple" style="color: #38bdf8;"></i> Барааны хандалт & Статистик</div>
        <div class="product-list" id="adminProductList">
            <p class="empty-text">Ачаалж байна...</p>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3>✏️ Бараа засах</h3>
                <button class="btn-close-modal" onclick="window.closeEditModal()">✕</button>
            </div>
            <input type="hidden" id="editProdId">
            
            <div class="form-group">
                <label>Барааны нэр</label>
                <input type="text" id="editProdName">
            </div>
            <div class="form-group">
                <label>Ангилал</label>
                <select id="editProdCategory">
                    <option value="Гутал">👟 Гутал</option>
                    <option value="Технологи">📱 Технологи</option>
                    <option value="Хувцас">👕 Хувцас</option>
                    <option value="Аксессуар">⌚ Аксессуар</option>
                    <option value="Бусад">📦 Бусад</option>
                </select>
            </div>

            <div class="form-group">
                <label>Бэлэн байгаа хэмжээ (Sizes)</label>
                <div class="size-checkboxes">
                    <label class="size-item"><input type="checkbox" name="editProdSize" value="XS"> XS</label>
                    <label class="size-item"><input type="checkbox" name="editProdSize" value="S"> S</label>
                    <label class="size-item"><input type="checkbox" name="editProdSize" value="M"> M</label>
                    <label class="size-item"><input type="checkbox" name="editProdSize" value="L"> L</label>
                    <label class="size-item"><input type="checkbox" name="editProdSize" value="XL"> XL</label>
                    <label class="size-item"><input type="checkbox" name="editProdSize" value="2XL"> 2XL</label>
                    <label class="size-item"><input type="checkbox" name="editProdSize" value="38"> 38</label>
                    <label class="size-item"><input type="checkbox" name="editProdSize" value="39"> 39</label>
                    <label class="size-item"><input type="checkbox" name="editProdSize" value="40"> 40</label>
                    <label class="size-item"><input type="checkbox" name="editProdSize" value="41"> 41</label>
                    <label class="size-item"><input type="checkbox" name="editProdSize" value="42"> 42</label>
                    <label class="size-item"><input type="checkbox" name="editProdSize" value="43"> 43</label>
                </div>
            </div>

            <div class="form-group">
                <label>Үнэ (₮)</label>
                <input type="text" id="editProdPrice">
            </div>

            <div class="form-group">
                <label>Үлдэгдэл тоо (Stock)</label>
                <input type="number" id="editProdStock">
            </div>

            <div class="form-group">
                <label>Тайлбар</label>
                <textarea id="editProdDesc"></textarea>
            </div>
            <div class="form-group">
                <label>Төлөв</label>
                <select id="editProdStatus">
                    <option value="in_stock">✅ Бэлэн байгаа</option>
                    <option value="out_of_stock">❌ Дууссан</option>
                </select>
            </div>
            <button class="btn-save-edit" onclick="window.saveProductEdit()">💾 Хадгалах</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7htpIxGtVfJ0HGd7-8DVXtwGwj2mHlOQ",
            authDomain: "temka-shop.firebaseapp.com",
            databaseURL: "https://temka-shop-default-rtdb.firebaseio.com",
            projectId: "temka-shop",
            storageBucket: "temka-shop.firebasestorage.app",
            messagingSenderId: "1057963752042",
            appId: "1:1057963752042:web:9e0c88d308ac1cc9c92813",
            measurementId: "G-9H3NQML5TV"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        let selectedBase64Images = [];
        let allProductsCache = {};

        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem("admin_authenticated") === "true") { showAdminPanel(); }
            document.getElementById("adminPasswordInput").addEventListener("keyup", function(event) {
                if (event.key === "Enter") { window.checkAdminPassword(); }
            });
        });

        window.checkAdminPassword = function() {
            var enteredPass = document.getElementById("adminPasswordInput").value;
            if(enteredPass === "0917@2050&2025") {
                localStorage.setItem("admin_authenticated", "true");
                showAdminPanel();
            } else {
                alert("❌ Нууц үг буруу байна!");
                document.getElementById("adminPasswordInput").value = "";
            }
        };

        function showAdminPanel() {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("adminMainContent").style.display = "block";
            loadProducts();
            loadOrders();
        }

        window.handleImageSelect = function(input) {
            if (input.files && input.files.length > 0) {
                let currentFilesCount = input.files.length;
                let filesProcessed = 0;

                Array.from(input.files).forEach(file => {
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        selectedBase64Images.push(e.target.result);
                        filesProcessed++;

                        if(filesProcessed === currentFilesCount) {
                            renderThumbnails();
                        }
                    };
                    reader.readAsDataURL(file);
                });
                input.value = ""; 
            }
        };

        function renderThumbnails() {
            var container = document.getElementById("imagePreviewContainer");
            container.innerHTML = "";

            selectedBase64Images.forEach((imgSrc, index) => {
                var itemDiv = document.createElement("div");
                itemDiv.className = "preview-item";

                itemDiv.innerHTML = `
                    <img src="${imgSrc}" class="preview-thumbnail">
                    <button type="button" class="remove-img-btn" onclick="window.removeSelectedImage(${index})">✕</button>
                `;
                container.appendChild(itemDiv);
            });

            if (selectedBase64Images.length > 0) {
                document.getElementById("uploadStatusText").innerText = "✅ Нийт " + selectedBase64Images.length + " зураг сонгогдсон байна";
            } else {
                document.getElementById("uploadStatusText").innerText = "📁 Энд дарж зургуудаа нэмнэ үү";
            }
        }

        window.removeSelectedImage = function(index) {
            selectedBase64Images.splice(index, 1);
            renderThumbnails();
        };

        function loadProducts() {
            var listDiv = document.getElementById("adminProductList");
            database.ref('products').on('value', function(snapshot) {
                listDiv.innerHTML = "";
                allProductsCache = {};
                if (!snapshot.exists()) { 
                    listDiv.innerHTML = '<p class="empty-text">Бараа байхгүй байна...</p>';
                    return; 
                }
                snapshot.forEach(function(childSnapshot) {
                    var prodId = childSnapshot.key;
                    var prod = childSnapshot.val();
                    allProductsCache[prodId] = prod;

                    var mainImg = (prod.images && prod.images.length > 0) ? prod.images[0] : 'https://via.placeholder.com/60';
                    var stockCount = (prod.stock !== undefined) ? prod.stock : 14;
                    var isOutOfStock = prod.status === 'out_of_stock' || stockCount <= 0;
                    
                    var statusBadge = isOutOfStock 
                        ? '<span class="stat-badge stat-status-out">❌ Дууссан</span>' 
                        : '<span class="stat-badge stat-status-in">✅ Бэлэн</span>';

                    var sizesText = (prod.sizes && prod.sizes.length > 0) ? prod.sizes.join(', ') : 'Байхгүй';

                    var row = document.createElement("div");
                    row.className = "admin-prod-card";
                    row.innerHTML = 
                        '<img src="' + mainImg + '" alt="">' +
                        '<div class="prod-info">' +
                            '<div class="prod-name">' + prod.name + '</div>' +
                            '<div class="prod-price">' + parseInt(prod.price || 0).toLocaleString() + '₮</div>' +
                            (prod.description ? '<div class="prod-desc">' + prod.description + '</div>' : '') +
                            '<div class="stats-container">' +
                                statusBadge +
                                '<span class="stat-badge stat-stock">📦 Үлдэгдэл: ' + stockCount + '</span>' +
                                '<span class="stat-badge stat-category">🏷️ ' + (prod.category || 'Гутал') + '</span>' +
                                '<span class="stat-badge stat-sizes">📏 ' + sizesText + '</span>' +
                                '<span class="stat-badge stat-views"><i class="fa-regular fa-eye"></i> ' + (prod.views || 0) + '</span>' +
                                '<span class="stat-badge stat-orders"><i class="fa-solid fa-cart-shopping"></i> ' + (prod.orders || 0) + '</span>' +
                            '</div>' +
                        '</div>' +
                        '<div class="prod-actions">' +
                            '<button class="btn-edit" onclick="window.openEditModal(\'' + prodId + '\')"><i class="fa-solid fa-pen-to-square"></i> Засах</button>' +
                            '<button class="btn-delete" onclick="window.deleteProduct(\'' + prodId + '\')"><i class="fa-solid fa-trash-can"></i></button>' +
                        '</div>';
                    listDiv.appendChild(row);
                });
            });
        }

        function loadOrders() {
            var orderDiv = document.getElementById("adminOrderList");
            database.ref('orders').on('value', function(snapshot) {
                orderDiv.innerHTML = "";
                if (!snapshot.exists()) { 
                    orderDiv.innerHTML = '<p class="empty-text">Шинэ захиалга байхгүй байна...</p>';
                    return; 
                }
                snapshot.forEach(function(childSnapshot) {
                    var orderId = childSnapshot.key;
                    var order = childSnapshot.val();
                    var card = document.createElement("div");
                    card.className = "order-card";
                    card.innerHTML = 
                        '<div class="order-info">' +
                            '<div class="order-row"><b>📧 Gmail:</b> ' + (order.email || 'Байхгүй') + '</div>' +
                            '<div class="order-row"><b>📞 Утас:</b> ' + (order.phone || 'Байхгүй') + '</div>' +
                            '<div class="order-row"><b>📦 Бараа:</b> ' + (order.items || order.productName || 'Мэдээлэлгүй') + '</div>' +
                            '<div class="order-row"><b>📍 Хаяг:</b> ' + (order.address || 'Байхгүй') + '</div>' +
                            '<div class="order-row" style="margin-top:6px;"><b>Гүйлгээний утга:</b> <span class="order-code-badge">' + (order.orderCode || 'Байхгүй') + '</span></div>' +
                        '</div>' +
                        '<button class="btn-complete" onclick="window.completeOrder(\'' + orderId + '\', \'' + (order.productId || '') + '\')">✅ Хүргэгдсэн (Хаах)</button>';
                    orderDiv.appendChild(card);
                });
            });
        }

        window.addProduct = function() {
            var name = document.getElementById("prodName").value.trim();
            var price = document.getElementById("prodPrice").value.trim();
            var category = document.getElementById("prodCategory").value;
            var description = document.getElementById("prodDesc").value.trim();
            var status = document.getElementById("prodStatus").value;
            var stockVal = document.getElementById("prodStock").value;
            var btn = document.getElementById("btnAddProduct");

            var stock = parseInt(stockVal) >= 0 ? parseInt(stockVal) : 14;

            // Сонгогдсон хэмжээг цуглуулах
            var selectedSizes = [];
            document.querySelectorAll('input[name="prodSize"]:checked').forEach(cb => {
                selectedSizes.push(cb.value);
            });

            if (selectedBase64Images.length === 0) { alert("Барааны зургийг оруулна уу!"); return; }
            if (!name || !price) { alert("Нэр болон үнийг оруулна уу!"); return; }

            btn.innerText = "Уншиж байна..."; btn.disabled = true;
            var numericPrice = parseInt(price.replace(/[^0-9]/g, '')) || 0;

            database.ref('products').push({
                images: selectedBase64Images,
                name: name,
                category: category,
                price: numericPrice,
                stock: stock,
                description: description,
                status: status,
                sizes: selectedSizes,
                views: 0,
                orders: 0
            }).then(function() {
                alert("Бараа амжилттай нэмэгдлээ!");
                document.getElementById("prodImageFile").value = "";
                document.getElementById("imagePreviewContainer").innerHTML = "";
                document.getElementById("uploadStatusText").innerText = "📁 Энд дарж зургуудаа нэмнэ үү";
                document.getElementById("prodName").value = "";
                document.getElementById("prodPrice").value = "";
                document.getElementById("prodStock").value = "14";
                document.getElementById("prodDesc").value = "";
                document.getElementById("prodStatus").value = "in_stock";
                
                // Checkbox-уудыг цэвэрлэх
                document.querySelectorAll('input[name="prodSize"]').forEach(cb => cb.checked = false);

                selectedBase64Images = [];
            }).finally(function() {
                btn.innerText = "＋ Шинэ бараа нэмэх"; btn.disabled = false;
            });
        };

        /* EDIT MODAL СУУРЬ ФУНКЦҮҮД */
        window.openEditModal = function(prodId) {
            var prod = allProductsCache[prodId];
            if(!prod) return;

            document.getElementById("editProdId").value = prodId;
            document.getElementById("editProdName").value = prod.name || "";
            document.getElementById("editProdCategory").value = prod.category || "Гутал";
            document.getElementById("editProdPrice").value = prod.price || 0;
            document.getElementById("editProdStock").value = (prod.stock !== undefined) ? prod.stock : 14;
            document.getElementById("editProdDesc").value = prod.description || "";
            document.getElementById("editProdStatus").value = prod.status || "in_stock";

            // Хэмжээг тохируулах Checkboxes
            var currentSizes = prod.sizes || [];
            document.querySelectorAll('input[name="editProdSize"]').forEach(cb => {
                cb.checked = currentSizes.includes(cb.value);
            });

            document.getElementById("editModal").style.display = "flex";
        };

        window.closeEditModal = function() {
            document.getElementById("editModal").style.display = "none";
        };

        window.saveProductEdit = function() {
            var prodId = document.getElementById("editProdId").value;
            var name = document.getElementById("editProdName").value.trim();
            var category = document.getElementById("editProdCategory").value;
            var price = document.getElementById("editProdPrice").value.toString().trim();
            var stockVal = document.getElementById("editProdStock").value;
            var description = document.getElementById("editProdDesc").value.trim();
            var status = document.getElementById("editProdStatus").value;

            var stock = parseInt(stockVal) >= 0 ? parseInt(stockVal) : 0;

            var selectedSizes = [];
            document.querySelectorAll('input[name="editProdSize"]:checked').forEach(cb => {
                selectedSizes.push(cb.value);
            });

            if(!name || !price) {
                alert("Нэр болон үнийг заавал бичнэ үү!");
                return;
            }

            var numericPrice = parseInt(price.replace(/[^0-9]/g, '')) || 0;

            database.ref('products/' + prodId).update({
                name: name,
                category: category,
                price: numericPrice,
                stock: stock,
                description: description,
                status: status,
                sizes: selectedSizes
            }).then(() => {
                alert("Барааны мэдээлэл амжилттай шинэчлэгдлээ! ✨");
                window.closeEditModal();
            }).catch((err) => {
                alert("Алдаа гарлаа: " + err.message);
            });
        };

        window.deleteProduct = function(prodId) {
            if(confirm("Энэ барааг устгахдаа итгэлтэй байна уу?")) {
                database.ref('products/' + prodId).remove().then(() => alert("Барааг устгалаа! 🗑️"));
            }
        };

        window.completeOrder = function(orderId, productId) {
            if(confirm("Энэ захиалгыг хүргэгдсэн гэж хаах уу?")) {
                // Хэрэв productId захиалгад байвал барааны үлдэгдлээс хасна
                if (productId) {
                    database.ref('products/' + productId).transaction(function(product) {
                        if (product) {
                            var currentStock = (product.stock !== undefined) ? product.stock : 14;
                            var newStock = currentStock > 0 ? currentStock - 1 : 0;
                            product.stock = newStock;
                            
                            // 0 болбол статусыг дууссан болгоно
                            if (newStock === 0) {
                                product.status = 'out_of_stock';
                            }
                            product.orders = (product.orders || 0) + 1;
                        }
                        return product;
                    });
                }

                database.ref('orders/' + orderId).remove().then(() => alert("Захиалга хаагдаж, үлдэгдэл тоо хасагдлаа! 🤝"));
            }
        };
    </script>
</body>
