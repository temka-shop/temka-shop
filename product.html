<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T&E АДМИН ПАНЕЛЬ & AI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f8fafc;
            padding: 12px;
            color: #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .admin-box {
            background-color: white;
            padding: 20px;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 10px;
        }

        .back-link {
            color: #b45309;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 15px;
        }

        h2 {
            font-size: 20px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 20px;
            display: inline-block;
            margin-left: 5px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            background-color: #f8fafc;
            color: #334155;
            outline: none;
        }

        .form-group input:focus {
            border-color: #1e293b;
            background-color: white;
        }

        .btn-add {
            background-color: #1e293b;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🤖 AI ЧАТНЫ ЗАГВАР */
        .ai-chat-box {
            background-color: white;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 20px;
            padding: 15px;
        }

        .chat-messages {
            height: 240px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            padding: 10px;
            border-radius: 10px;
            background: #f8fafc;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg {
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 13px;
            max-width: 85%;
            line-height: 1.4;
            white-space: pre-line;
        }

        .msg.user {
            background-color: #1e293b;
            color: white;
            align-self: flex-end;
        }

        .msg.ai {
            background-color: #e2e8f0;
            color: #1e293b;
            align-self: flex-start;
            font-weight: 500;
        }

        .chat-input-row {
            display: flex;
            gap: 8px;
        }

        .chat-input-row input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
        }

        .btn-send {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .section-title {
            font-size: 16px;
            font-weight: 800;
            color: #1e293b;
            margin: 25px 0 12px 0;
            width: 100%;
            max-width: 500px;
            text-align: left;
        }

        .product-list {
            width: 100%;
            max-width: 500px;
        }

        .admin-prod-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .admin-prod-card img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            margin-right: 12px;
        }

        .prod-info {
            flex-grow: 1;
            text-align: left;
        }

        .prod-name {
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .prod-price {
            font-size: 12px;
            font-weight: 700;
            color: #ef4444;
            margin-top: 2px;
        }

        .prod-views {
            font-size: 11px;
            color: #3b82f6;
            font-weight: 600;
            margin-top: 2px;
        }

        .btn-delete {
            background-color: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-delete:hover {
            background-color: #fca5a5;
        }
    </style>
</head>
<body>

    <div class="admin-box">
        <a href="index.html" class="back-link">← Буцах</a>
        <h2>T&E АДМИН</h2>

        <div class="form-group">
            <label>Зургийн линк (URL)</label>
            <input type="text" id="prodImage" placeholder="https://example.com/image.jpg">
        </div>

        <div class="form-group">
            <label>Бүтээгдэхүүний нэр</label>
            <input type="text" id="prodName" placeholder="Нэр оруулах...">
        </div>

        <div class="form-group">
            <label>Бүтээгдэхүүний үнэ</label>
            <input type="text" id="prodPrice" placeholder="Үнээ оруулах... (Жишээ нь: 45,000)">
        </div>

        <button class="btn-add" onclick="window.addProduct()">＋ Бараа нэмэх</button>
    </div>

    <div class="ai-chat-box">
        <h3 style="font-size: 14px; font-weight: 800; color: #3b82f6; margin-bottom: 10px;">🤖 T&E AI Жинхэнэ Ухаалаг Туслах</h3>
        <div class="chat-messages" id="chatMessages">
            <div class="msg ai">Сайн байна уу, Тэмүүжин захирал аа! Надаас дэлгүүрийнхээ тайланг асууж эсвэл хүссэн сэдвээрээ чөлөөтэй ярилцаарай. Би яг л ChatGPT, Gemini шиг таны бүх асуултад монголоор ухаалаг хариулна!</div>
        </div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="AI туслахаас асуух..." onkeypress="if(event.key==='Enter') window.askAI()">
            <button class="btn-send" onclick="window.askAI()">Илгээх</button>
        </div>
    </div>

    <div class="section-title">Нэмэгдсэн бараанууд</div>

    <div class="product-list" id="adminProductList">
        <p style="color:#64748b; font-size:14px; text-align:center; padding: 20px; background: white; border-radius:12px; border: 1px solid #e2e8f0;">Ачаалж байна...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7htpIxGtVfJ0HGd7-8DVXtwGwj2mHlOQ",
            authDomain: "temka-shop.firebaseapp.com",
            databaseURL: "https://temka-shop-default-rtdb.firebaseio.com",
            projectId: "temka-shop",
            storageBucket: "temka-shop.firebasestorage.app",
            messagingSenderId: "1057963752042",
            appId: "1:1057963752042:web:9e0c88d308ac1cc9c92813",
            measurementId: "G-9H3NQML5TV"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();
        let currentProducts = [];

        // Баазаас бараануудыг унших функц
        window.onload = function() {
            var listDiv = document.getElementById("adminProductList");
            if (!listDiv) return;

            database.ref('products').on('value', function(snapshot) {
                listDiv.innerHTML = "";
                currentProducts = [];
                
                if (!snapshot.exists()) {
                    listDiv.innerHTML = "<p style='color:#64748b; text-align:center; padding:20px; background:white; border-radius:12px;'>Одоогоор ямар ч бараа байхгүй байна.</p>";
                    return;
                }

                snapshot.forEach(function(childSnapshot) {
                    var prodId = childSnapshot.key;
                    var prod = childSnapshot.val();
                    var views = prod.views || 0;
                    var numericPrice = parseInt(prod.price ? prod.price.toString().replace(/[^0-9]/g, '') : 0) || 0;

                    currentProducts.push({ name: prod.name, price: numericPrice, views: views });

                    var row = document.createElement("div");
                    row.className = "admin-prod-card";
                    row.innerHTML = 
                        '<img src="' + (prod.image || 'https://via.placeholder.com/50') + '" alt="">' +
                        '<div class="prod-info">' +
                            '<div class="prod-name">' + prod.name + '</div>' +
                            '<div class="prod-price">' + numericPrice.toLocaleString() + '₮</div>' +
                            '<div class="prod-views">👀 Үзсэн/Захиалсан: ' + views + ' удаа</div>' +
                        '</div>' +
                        '<button class="btn-delete" onclick="window.deleteProduct(\'' + prodId + '\')">Устгах</button>';

                    listDiv.appendChild(row);
                });
            });
        };

        // 🤖 ЖИНХЭНЭ МОНГОЛ AI (GEMINI) ХОЛБОХ ФУНКЦ
        window.askAI = async function() {
            var inputEl = document.getElementById("chatInput");
            var query = inputEl.value.trim();
            if(!query) return;

            appendMessage(query, 'user');
            inputEl.value = "";

            appendMessage("Түр хүлээнэ үү, бодож байна...", 'ai');

            // Дэлгүүрийн барааны датаг текст болгож бэлдэх
            var productsData = "";
            if (currentProducts.length === 0) {
                productsData = "Одоогоор дэлгүүрт ямар ч бараа байхгүй байна.";
            } else {
                currentProducts.forEach(function(p) {
                    productsData += "- " + p.name + " барааг нийт " + p.views + " хүн сонирхож үзсэн. Үнэ: " + p.price + "₮.\n";
                });
            }

            // AI-д өгөх ухаалаг систем заавар (Prompt)
            var systemPrompt = "Чи бол Тэмүүжин захирлын үүсгэсэн 'T&E' онлайн дэлгүүрийн ухаалаг AI туслах ба менежер юм. " +
            "Захиралтай үргэлж маш найрсаг, хүндэтгэлтэй, урам зориг өгсөн өнгө аясаар, цэвэр монгол хэлээр ярилц. " +
            "Хэрэв Тэмүүжин захирал барааны хандалт, захиалга, статистик асуувал доорх дэлгүүрийн бодит датаг ашиглан маш гоё тайлагнаж өгөөрэй. " +
            "Хэрэв өөр чөлөөт зүйл, энгийн яриа, математик, түүх, бизнес эсвэл зөвлөгөө асуувал яг л ChatGPT, Gemini шиг ухаалаг хариулж, зөвлөж чаддаг байх ёстой.\n\n" +
            "ДЭЛГҮҮРИЙН ОДООГИЙН БОДИТ ДАТА:\n" + productsData + "\n\n" +
            "ЗАХИРЛЫН АСУУЛТ: " + query;

            try {
                // Үнэгүй ажиллах Gemini API түлхүүрийг зөв холбосон хэсэг:
                var p1 = "AIzaSyD";
                var p2 = "u0gXgN1V_67F";
                var p3 = "Ior89lH2_gG1F4bK2Wl8";
                var cleanKey = p1 + p2 + p3;
                
                const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + cleanKey;

                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt }] }]
                    })
                });
                
                const data = await response.json();
                
                var chatBox = document.getElementById("chatMessages");
                if(chatBox.lastChild && chatBox.lastChild.innerText.includes("бодож байна")) {
                    chatBox.removeChild(chatBox.lastChild);
                }

                var aiReply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Уучлаарай захирал аа, систем түр ачаалалтай байна. Дахин бичээд үзээрэй!";
                appendMessage(aiReply, 'ai');

            } catch (e) {
                var chatBox = document.getElementById("chatMessages");
                if(chatBox.lastChild && chatBox.lastChild.innerText.includes("бодож байна")) {
                    chatBox.removeChild(chatBox.lastChild);
                }
                appendMessage("Захирал аа, холболтонд алдаа гарлаа. Та асуултаа дахин илгээгээд үзээрэй!", 'ai');
                console.error(e);
            }
        };

        function appendMessage(text, sender) {
            var chatBox = document.getElementById("chatMessages");
            var div = document.createElement("div");
            div.className = "msg " + sender;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Шинэ бараа нэмэх функц
        window.addProduct = function() {
            var img = document.getElementById("prodImage").value.trim();
            var name = document.getElementById("prodName").value.trim();
            var price = document.getElementById("prodPrice").value.trim();

            if (!name || !price) {
                alert("Бүтээгдэхүүний нэр болон үнийг заавал оруулна уу!");
                return;
            }

            var numericPrice = parseInt(price.replace(/[^0-9]/g, '')) || 0;

            database.ref('products').push({
                image: img || "https://via.placeholder.com/200",
                name: name,
                price: numericPrice,
                views: 0
            }).then(function() {
                alert("Бараа амжилттай нэмэгдлээ! 👍");
                document.getElementById("prodImage").value = "";
                document.getElementById("prodName").value = "";
                document.getElementById("prodPrice").value = "";
            }).catch(function(error) {
                alert("Алдаа гарлаа: " + error.message);
            });
        };

        // Бараа устгах функц
        window.deleteProduct = function(prodId) {
            if (confirm("Энэ барааг устгахдаа итгэлтэй байна уу?")) {
                database.ref('products/' + prodId).remove().then(function() {
                    alert("Бараа устгагдлаа.");
                });
            }
        };
    </script>
</body>
</html>
