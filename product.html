<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T&E АДМИН ПАНЕЛЬ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f8fafc;
            padding: 12px;
            color: #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .admin-box {
            background-color: white;
            padding: 20px;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 10px;
        }

        .back-link {
            color: #b45309;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 15px;
        }

        h2 {
            font-size: 20px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 20px;
            display: inline-block;
            margin-left: 5px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            background-color: #f8fafc;
            color: #334155;
            outline: none;
        }

        .form-group input:focus {
            border-color: #1e293b;
            background-color: white;
        }

        .btn-add {
            background-color: #1e293b;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .section-title {
            font-size: 16px;
            font-weight: 800;
            color: #1e293b;
            margin: 25px 0 12px 0;
            width: 100%;
            max-width: 500px;
            text-align: left;
        }

        .product-list {
            width: 100%;
            max-width: 500px;
        }

        .admin-prod-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .admin-prod-card img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            margin-right: 12px;
        }

        .prod-info {
            flex-grow: 1;
            text-align: left;
        }

        .prod-name {
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .prod-price {
            font-size: 12px;
            font-weight: 700;
            color: #ef4444;
            margin-top: 2px;
        }

        .btn-delete {
            background-color: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-delete:hover {
            background-color: #fca5a5;
        }
    </style>
</head>
<body>

    <div class="admin-box">
        <a href="index.html" class="back-link">← Буцах</a>
        <h2>T&E АДМИН</h2>

        <div class="form-group">
            <label>Зургийн линк (URL)</label>
            <input type="text" id="prodImage" placeholder="https://example.com/image.jpg">
        </div>

        <div class="form-group">
            <label>Бүтээгдэхүүний нэр</label>
            <input type="text" id="prodName" placeholder="Нэр оруулах...">
        </div>

        <div class="form-group">
            <label>Бүтээгдэхүүний үнэ</label>
            <input type="text" id="prodPrice" placeholder="Үнээ оруулах... (Жишээ нь: 45,000)">
        </div>

        <button class="btn-add" onclick="window.addProduct()">＋ Бараа нэмэх</button>
    </div>

    <div class="section-title">Нэмэгдсэн бараанууд</div>

    <div class="product-list" id="adminProductList">
        <p style="color:#64748b; font-size:14px; text-align:center; padding: 20px; background: white; border-radius:12px; border: 1px solid #e2e8f0;">Ачаалж байна...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Чиний Firebase тохиргоо (Яг таг зөв холболт)
        const firebaseConfig = {
            apiKey: "AIzaSyD7htpIxGtVfJ0HGd7-8DVXtwGwj2mHlOQ",
            authDomain: "temka-shop.firebaseapp.com",
            databaseURL: "https://temka-shop-default-rtdb.firebaseio.com",
            projectId: "temka-shop",
            storageBucket: "temka-shop.firebasestorage.app",
            messagingSenderId: "1057963752042",
            appId: "1:1057963752042:web:9e0c88d308ac1cc9c92813",
            measurementId: "G-9H3NQML5TV"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        // Баазаас бараануудыг уншиж админ дээр жагсаах функц
        window.onload = function() {
            var listDiv = document.getElementById("adminProductList");
            if (!listDiv) return;

            database.ref('products').on('value', function(snapshot) {
                listDiv.innerHTML = "";
                
                if (!snapshot.exists()) {
                    listDiv.innerHTML = "<p style='color:#64748b; text-align:center; padding:20px; background:white; border-radius:12px;'>Одоогоор ямар ч бараа байхгүй байна.</p>";
                    return;
                }

                snapshot.forEach(function(childSnapshot) {
                    var prodId = childSnapshot.key;
                    var prod = childSnapshot.val();
                    var numericPrice = parseInt(prod.price ? prod.price.toString().replace(/[^0-9]/g, '') : 0) || 0;

                    var row = document.createElement("div");
                    row.className = "admin-prod-card";
                    row.innerHTML = 
                        '<img src="' + (prod.image || 'https://via.placeholder.com/50') + '" alt="">' +
                        '<div class="prod-info">' +
                            '<div class="prod-name">' + prod.name + '</div>' +
                            '<div class="prod-price">' + numericPrice.toLocaleString() + '₮</div>' +
                        '</div>' +
                        '<button class="btn-delete" onclick="window.deleteProduct(\'' + prodId + '\')">Устгах</button>';

                    listDiv.appendChild(row);
                });
            });
        };

        // Шинэ бараа нэмэх функц
        window.addProduct = function() {
            var img = document.getElementById("prodImage").value.trim();
            var name = document.getElementById("prodName").value.trim();
            var price = document.getElementById("prodPrice").value.trim();

            if (!name || !price) {
                alert("Бүтээгдэхүүний нэр болон үнийг заавал оруулна уу!");
                return;
            }

            var numericPrice = parseInt(price.replace(/[^0-9]/g, '')) || 0;

            database.ref('products').push({
                image: img || "https://via.placeholder.com/200",
                name: name,
                price: numericPrice,
                views: 0
            }).then(function() {
                alert("Бараа амжилттай нэмэгдлээ! 👍");
                document.getElementById("prodImage").value = "";
                document.getElementById("prodName").value = "";
                document.getElementById("prodPrice").value = "";
            }).catch(function(error) {
                alert("Алдаа гарлаа: " + error.message);
            });
        };

        // Бараа устгах функц
        window.deleteProduct = function(prodId) {
            if (confirm("Энэ барааг устгахдаа итгэлтэй байна уу?")) {
                database.ref('products/' + prodId).remove().then(function() {
                    alert("Бараа устгагдлаа.");
                });
            }
        };
    </script>
</body>
</html>
