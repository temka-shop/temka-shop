<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Миний сагс - T&S Shopp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background-color: #f8fafc; color: #1e293b; padding: 20px 4%; }
        
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .btn-back { background: white; border: 1px solid #e2e8f0; width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #0f172a; text-decoration: none; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        h1 { font-size: 20px; font-weight: 800; color: #0f172a; }

        .cart-container { display: flex; flex-direction: column; gap: 16px; max-width: 600px; margin: 0 auto; }
        .cart-item { background: white; border: 1px solid #f1f5f9; border-radius: 18px; padding: 14px; display: flex; gap: 14px; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.01); position: relative; }
        
        .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 1px solid #f1f5f9; background: #f8fafc; cursor: pointer; }
        
        .item-details { flex: 1; text-align: left; }
        .item-name { font-size: 14px; font-weight: 700; color: #1e293b; text-transform: capitalize; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .item-price { font-size: 15px; font-weight: 800; color: #0f172a; }
        
        .quantity-controls { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
        .btn-qty { background: #f1f5f9; border: none; width: 28px; height: 28px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; color: #0f172a; display: flex; align-items: center; justify-content: center; }
        .qty-num { font-size: 14px; font-weight: 700; min-width: 15px; text-align: center; }
        
        .btn-remove { position: absolute; top: 14px; right: 14px; background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 16px; }
        .btn-remove:hover { color: #ef4444; }

        .summary-card { background: white; border: 1px solid #e2e8f0; border-radius: 20px; padding: 20px; margin-top: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.02); }
        .summary-row { display: flex; justify-content: space-between; font-size: 14px; color: #64748b; margin-bottom: 8px; }
        .summary-total { display: flex; justify-content: space-between; font-size: 17px; font-weight: 800; color: #0f172a; border-top: 1px dashed #e2e8f0; padding-top: 12px; margin-top: 12px; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); justify-content: center; align-items: center; }
        .modal-content { background-color: white; padding: 24px; border-radius: 24px; width: 92%; max-width: 420px; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #94a3b8; }
        .price-details { text-align: left; background-color: #f8fafc; padding: 16px; border-radius: 16px; margin: 16px 0; border: 1px solid #f1f5f9; }
        .price-text { font-weight: 700; color: #0f172a; font-size: 16px; text-align: center; margin-bottom: 4px; }
        .price-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; color: #64748b; }
        .total-text { color: #10b981; font-size: 16px; font-weight: 700; margin-top: 10px; border-top: 1px dashed #e2e8f0; padding-top: 10px; display: flex; justify-content: space-between; }
        .modal-bank-card { background: #f8fafc; border-radius: 16px; padding: 14px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
        .bank-info-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 8px; }
        .bank-info-row:last-child { margin-bottom: 0; }
        .bank-info-label { color: #64748b; }
        .bank-info-value { font-weight: 700; color: #0f172a; }
        .btn-copy { background-color: white; border: 1px solid #cbd5e1; padding: 2px 6px; font-size: 10px; border-radius: 6px; cursor: pointer; margin-left: 4px; font-weight: 600; }
        .phone-input-group { margin-bottom: 14px; text-align: left; }
        .phone-input-group label { display: block; font-size: 11px; font-weight: 700; color: #0f172a; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .phone-input-group input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; font-weight: 600; transition: border 0.2s; }
        .phone-input-group input:focus { border-color: #0f172a; }
        .address-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
        .address-group { text-align: left; }
        .address-group label { display: block; font-size: 10px; font-weight: 700; color: #0f172a; margin-bottom: 4px; text-transform: uppercase; }
        .address-group input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 13px; outline: none; font-weight: 600; }
        .btn-close-modal { background: #0f172a; color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-size: 14px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15); width: 100%; margin-top: 10px; }

        .image-preview-modal { display: none; position: fixed; z-index: 1100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); justify-content: center; align-items: center; }
        .image-preview-wrapper { position: relative; max-width: 90%; max-height: 75vh; display: flex; justify-content: center; align-items: center; }
        .image-preview-content { max-width: 100%; max-height: 75vh; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); object-fit: contain; }
        .image-preview-title { position: absolute; bottom: -55px; color: white; font-size: 15px; font-weight: 700; background: rgba(15, 23, 42, 0.7); padding: 6px 20px; border-radius: 30px; white-space: nowrap; }
        .close-preview-btn { position: absolute; top: -50px; right: 0; color: white; font-size: 35px; cursor: pointer; background: none; border: none; }
        
        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .arrow-left { left: -60px; }
        .arrow-right { right: -60px; }

        @media (max-width: 768px) {
            .arrow-left { left: -15px; background: rgba(0,0,0,0.5); }
            .arrow-right { right: -15px; background: rgba(0,0,0,0.5); }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
        <h1>Миний сагс</h1>
    </div>

    <div class="cart-container" id="cartItemsList"></div>

    <div class="summary-card" id="cartSummaryBlock" style="max-width: 600px; margin: 20px auto 0 auto; display: none;">
        <div class="summary-row">
            <span>Барааны нийт үнэ:</span>
            <span id="summarySubtotal">0₮</span>
        </div>
        <div class="summary-row">
            <span>Хүргэлтийн төлбөр:</span>
            <span style="color: #2563eb;">+3,000₮</span>
        </div>
        <div class="summary-total">
            <span>Нийт төлөх дүн:</span>
            <span id="summaryGrandTotal">0₮</span>
        </div>
        <button class="btn-close-modal" onclick="window.openOrderModal()">🛒 Захиалга баталгаажуулах</button>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="window.closeModal()">&times;</span>
            <h3 style="text-align: center; font-size: 16px; font-weight: 800; margin-bottom:10px;">🛒 Захиалга Баталгаажуулах</h3>
            
            <div class="price-details">
                <p class="price-text" id="modalProductTitle">Сагсан дахь бүх бараа</p>
                <div class="price-row">
                    <span>Барааны үнэ:</span>
                    <span id="modalProductPriceOnly">0₮</span>
                </div>
                <div class="price-row">
                    <span>Хүргэлт:</span>
                    <span style="color: #2563eb;">+3,000₮</span>
                </div>
                <div class="total-text">
                    <span>Нийт дүн:</span>
                    <span id="modalTotalWithShipping">0₮</span>
                </div>
            </div>
            
            <div class="modal-bank-card">
                <div class="bank-info-row">
                    <span class="bank-info-label">Банк:</span>
                    <span class="bank-info-value" style="color: #2563eb;">ХХБ (TDB)</span>
                </div>
                <div class="bank-info-row">
                    <span class="bank-info-label">Данс:</span>
                    <div>
                        <span class="bank-info-value" id="bankAcc">428025046</span>
                        <button class="btn-copy" onclick="window.copyText('bankAcc', this)">Хуулах</button>
                    </div>
                </div>
                <div class="bank-info-row">
                    <span class="bank-info-label">Хүлээн авагч:</span>
                    <span class="bank-info-value">Б.Тэмүүжин</span>
                </div>
                <div class="bank-info-row">
                    <span class="bank-info-label" style="color:#ef4444; font-weight:bold;">Гүйлгээний утга:</span>
                    <span class="bank-info-value" id="modalOrderCode" style="color:#ef4444; font-weight: 800;">---</span>
                </div>
            </div>

            <div class="phone-input-group">
                <label>1. Gmail хаяг:</label>
                <input type="email" id="userEmail" placeholder="Жишээ: yourname@gmail.com">
            </div>

            <div class="phone-input-group">
                <label>2. Холбоо барих утасны дугаар:</label>
                <input type="number" id="userPhone" placeholder="Жишээ: 99112233">
            </div>

            <div style="text-align: left; margin-bottom: 4px;"><label style="font-size: 11px; font-weight: bold; color: #0f172a; text-transform: uppercase;">3. Хүргэлтийн хаяг:</label></div>
            <div class="address-grid">
                <div class="address-group">
                    <label>Дүүрэг:</label>
                    <input type="text" id="addrDistrict" placeholder="БГД, БЗД">
                </div>
                <div class="address-group">
                    <label>Хороо:</label>
                    <input type="text" id="addrKhoroo" placeholder="3-р хороо">
                </div>
                <div class="address-group">
                    <label>Байр/Хороолол:</label>
                    <input type="text" id="addrBuilding" placeholder="12-р байр">
                </div>
                <div class="address-group">
                    <label>Тоот:</label>
                    <input type="text" id="addrDoor" placeholder="45 тоот">
                </div>
            </div>

            <div class="phone-input-group">
                <label>4. Төлбөрийн баримт оруулах:</label>
                <input type="file" id="userReceipt" accept="image/*" style="width: 100%; padding: 8px; border: 2px solid #cbd5e1; border-radius: 8px; background: white; font-weight: bold;">
            </div>

            <button class="btn-close-modal" onclick="window.submitOrder()">✅ Захиалга илгээх & Төлөх</button>
        </div>
    </div>

    <div id="imagePreviewModal" class="image-preview-modal">
        <div class="image-preview-wrapper">
            <button class="close-preview-btn" onclick="window.closeImagePreview()">&times;</button>
            <button class="nav-arrow arrow-left" onclick="window.changePreviewImage(-1)"><i class="fa-solid fa-chevron-left"></i></button>
            <img id="previewModalImg" class="image-preview-content" src="" alt="Томруулсан зураг">
            <button class="nav-arrow arrow-right" onclick="window.changePreviewImage(1)"><i class="fa-solid fa-chevron-right"></i></button>
            <div id="previewModalTitle" class="image-preview-title">Барааны нэр</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7htpIxGtVfJ0HGd7-8DVXtwGwj2mHlOQ",
            authDomain: "temka-shop.firebaseapp.com",
            databaseURL: "https://temka-shop-default-rtdb.firebaseio.com",
            projectId: "temka-shop",
            storageBucket: "temka-shop.firebasestorage.app",
            messagingSenderId: "1057963752042",
            appId: "1:1057963752042:web:9e0c88d308ac1cc9c92813",
            measurementId: "G-9H3NQML5TV"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        const TG_BOT_TOKEN = "8791135920:AAEP7B1oC3e4cYbUT3ThHxH6QmHanMzsbdU"; 
        const TG_CHAT_ID = "6759790987"; 

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        let currentImagesArray = [];
        let currentImageIndex = 0;
        let currentActiveTitle = "";
        let calculatedSubtotal = 0; 

        window.onload = function() {
            window.renderCart();
        };

        window.renderCart = function() {
            const listContainer = document.getElementById("cartItemsList");
            const summaryBlock = document.getElementById("cartSummaryBlock");
            if (!listContainer) return;

            listContainer.innerHTML = "";
            calculatedSubtotal = 0; 

            if (cart.length === 0) {
                listContainer.innerHTML = "<p style='color:#64748b; font-size:14px; text-align:center; padding: 40px 0;'>Сагс хоосон байна.</p>";
                if (summaryBlock) summaryBlock.style.display = "none";
                return;
            }

            if (summaryBlock) summaryBlock.style.display = "block";

            database.ref('products').once('value', function(snapshot) {
                let firebaseProducts = [];
                snapshot.forEach(function(childSnapshot) {
                    firebaseProducts.push(childSnapshot.val());
                });

                cart.forEach(function(item, index) {
                    const itemTotal = item.price * item.quantity;
                    calculatedSubtotal += itemTotal;

                    let mainImg = item.image || 'https://via.placeholder.com/200';
                    let imagesList = [mainImg];

                    let foundProd = firebaseProducts.find(p => p.name.toLowerCase().trim() === item.name.toLowerCase().trim());
                    if (foundProd && foundProd.images && foundProd.images.length > 0) {
                        imagesList = foundProd.images;
                    }

                    let encodedImages = encodeURIComponent(JSON.stringify(imagesList));

                    const card = document.createElement("div");
                    card.className = "cart-item";
                    card.innerHTML = 
                        '<img src="' + mainImg + '" alt="' + item.name + '" onclick="window.openCartImagePreview(\'' + encodedImages + '\', \'' + item.name.replace(/'/g, "\\'") + '\')">' +
                        '<div class="item-details">' +
                            '<h3 class="item-name">' + item.name + '</h3>' +
                            '<p class="item-price">' + itemTotal.toLocaleString() + '₮</p>' +
                            '<div class="quantity-controls">' +
                                '<button class="btn-qty" onclick="window.changeQuantity(' + index + ', -1)">-</button>' +
                                '<span class="qty-num">' + item.quantity + '</span>' +
                                '<button class="btn-qty" onclick="window.changeQuantity(' + index + ', 1)">+</button>' +
                            '</div>' +
                        '</div>' +
                        '<button class="btn-remove" onclick="window.removeFromCart(' + index + ')"><i class="fa-solid fa-trash-can"></i></button>';
                    
                    listContainer.appendChild(card);
                });

                document.getElementById("summarySubtotal").innerText = calculatedSubtotal.toLocaleString() + "₮";
                document.getElementById("summaryGrandTotal").innerText = (calculatedSubtotal + 3000).toLocaleString() + "₮";
            });
        };

        window.openCartImagePreview = function(encodedImages, title) {
            currentImagesArray = JSON.parse(decodeURIComponent(encodedImages));
            currentImageIndex = 0;
            currentActiveTitle = title;
            updatePreviewDOM();
            document.getElementById("imagePreviewModal").style.display = "flex";
        };

        function updatePreviewDOM() {
            if (currentImagesArray.length > 0) {
                document.getElementById("previewModalImg").src = currentImagesArray[currentImageIndex];
                document.getElementById("previewModalTitle").innerText = currentActiveTitle + " (" + (currentImageIndex + 1) + "/" + currentImagesArray.length + ")";
            }
        }

        window.changePreviewImage = function(direction) {
            currentImageIndex += direction;
            if (currentImageIndex >= currentImagesArray.length) { currentImageIndex = 0; }
            if (currentImageIndex < 0) { currentImageIndex = currentImagesArray.length - 1; }
            updatePreviewDOM();
        };

        window.closeImagePreview = function() {
            document.getElementById("imagePreviewModal").style.display = "none";
        };

        window.changeQuantity = function(index, delta) {
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            window.renderCart();
        };

        window.removeFromCart = function(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            window.renderCart();
        };

        window.openOrderModal = function() {
            document.getElementById("modalProductPriceOnly").innerText = calculatedSubtotal.toLocaleString() + "₮";
            document.getElementById("modalTotalWithShipping").innerText = (calculatedSubtotal + 3000).toLocaleString() + "₮";
            
            document.getElementById("userEmail").value = "";
            document.getElementById("userPhone").value = "";
            document.getElementById("userReceipt").value = "";
            document.getElementById("addrDistrict").value = "";
            document.getElementById("addrKhoroo").value = "";
            document.getElementById("addrBuilding").value = "";
            document.getElementById("addrDoor").value = "";

            var randomCode = "TE-" + Math.floor(1000 + Math.random() * 9000);
            document.getElementById("modalOrderCode").innerText = randomCode;

            document.getElementById("orderModal").style.display = "flex";
        };

        window.submitOrder = function() {
            var emailInput = document.getElementById("userEmail").value.trim();
            var phoneInput = document.getElementById("userPhone").value.trim();
            var orderCode = document.getElementById("modalOrderCode").innerText;
            var receiptInput = document.getElementById("userReceipt");
            
            var district = document.getElementById("addrDistrict").value.trim();
            var khoroo = document.getElementById("addrKhoroo").value.trim();
            var building = document.getElementById("addrBuilding").value.trim();
            var door = document.getElementById("addrDoor").value.trim();

            // ЗАСВАР: Баталгаажуулах хэсэгт Gmail-ийг шалгадаг болгов
            if (!emailInput || !emailInput.includes("@")) {
                alert("Захиалга баталгаажуулахын тулд Gmail хаягаа зөв оруулна уу!");
                return;
            }
            if (!phoneInput || phoneInput.length < 6) {
                alert("Захиалга баталгаажуулахын тулд утасны дугаараа зөв оруулна уу!");
                return;
            }
            if (!district || !khoroo || !building || !door) {
                alert("Хүргэлтийн хаягаа бүрэн оруулна уу!");
                return;
            }
            if (!receiptInput.files || receiptInput.files.length === 0) {
                alert("Төлбөр төлсөн баримтын зургаа заавал оруулна уу!");
                return;
            }

            var file = receiptInput.files[0];
            var totalAmount = (calculatedSubtotal + 3000).toLocaleString() + "₮";
            var fullAddress = district + ", " + khoroo + ", " + building + ", " + door;

            let itemsText = cart.map(item => item.name + " (" + item.quantity + "ш)").join(", ");

            // ЗАСВАР: Telegram-руу явах текст мессеж рүү Gmail-ийг нэмж харуулав
            var textMessage = "🔔 САГСНЫ ШИНЭ ЗАХИАЛГА!\n\n📧 Gmail: " + emailInput + "\n📞 Утас: " + phoneInput + "\n📦 Бараанууд: " + itemsText + "\n📍 Хаяг: " + fullAddress + "\n💰 Нийт дүн: " + totalAmount + "\n🔢 Гүйлгээний утга: " + orderCode;

            var formData = new FormData();
            formData.append("chat_id", TG_CHAT_ID);
            formData.append("photo", file);
            formData.append("caption", textMessage);

            var submitBtn = document.querySelector(".btn-close-modal");
            submitBtn.disabled = true;

            fetch("https://api.telegram.org/bot" + TG_BOT_TOKEN + "/sendPhoto", {
                method: "POST",
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if(data.ok) {
                    // ЗАСВАР: Firebase рүү Gmail хаягийг цуг хадгалах хэсэг
                    database.ref('orders').push({ 
                        email: emailInput,
                        phone: phoneInput, 
                        items: itemsText, 
                        address: fullAddress,
                        orderCode: orderCode, 
                        timestamp: Date.now() 
                    });
                    alert("Сагсан дахь захиалга амжилттай илгээгдлээ! Сагсыг хоосоллоо. 👍");
                    cart = [];
                    localStorage.setItem('cart', JSON.stringify(cart));
                    window.closeModal();
                    window.renderCart();
                } else {
                    alert("Алдаа гарлаа: Бот руу илгээж чадсангүй.");
                }
            })
            .catch(err => { alert("Холболтын алдаа: " + err.message); })
            .finally(() => { submitBtn.disabled = false; });
        };

        window.closeModal = function() { document.getElementById("orderModal").style.display = "none"; };
        window.copyText = function(id, btn) { navigator.clipboard.writeText(document.getElementById(id).innerText).then(function() { var txt = btn.innerText; btn.innerText = "Хуулагдлаа!"; setTimeout(function() { btn.innerText = txt; }, 2000); }); };
    </script>
</body>
</html>
