<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Миний Сагс - T&E Shopp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f8fafc; color: #1e293b; padding: 16px; }
        
        .cart-container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        
        .back-btn { 
            display: inline-block; 
            color: #0f172a; 
            text-decoration: none; 
            font-weight: bold; 
            margin-bottom: 20px; 
            font-size: 14px; 
        }
        
        h2 { font-size: 20px; font-weight: 800; margin-bottom: 20px; color: #0f172a; }
        
        .cart-item { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 12px 0; 
            border-bottom: 1px solid #f1f5f9; 
        }
        
        .cart-item img { 
            width: 50px; 
            height: 50px; 
            object-fit: cover; 
            border-radius: 8px; 
            margin-right: 12px; 
            background-color: #f8fafc;
        }
        
        .item-info { flex-grow: 1; text-align: left; }
        .item-name { font-size: 14px; font-weight: 600; color: #1e293b; }
        .item-price { font-size: 13px; font-weight: 700; color: #ef4444; }
        
        .quantity-control { display: flex; align-items: center; gap: 10px; }
        
        .qty-btn { 
            background: #f1f5f9; 
            border: 1px solid #cbd5e1; 
            width: 26px; 
            height: 26px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        
        .btn-remove { 
            background: none; 
            border: none; 
            color: #94a3b8; 
            cursor: pointer; 
            margin-left: 10px; 
            font-size: 16px; 
        }
        .btn-remove:hover { color: #ef4444; }
        
        .cart-summary { 
            background: #f8fafc; 
            padding: 16px; 
            border-radius: 12px; 
            margin-top: 20px; 
            border: 1px solid #f1f5f9; 
        }
        
        .summary-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; color: #64748b; }
        
        .summary-total { 
            display: flex; 
            justify-content: space-between; 
            font-size: 16px; 
            font-weight: 700; 
            color: #10b981; 
            border-top: 1px dashed #e2e8f0; 
            padding-top: 10px; 
            margin-top: 10px; 
        }
        
        .bank-box { 
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            padding: 12px; 
            margin-top: 15px; 
            font-size: 12px; 
        }
        
        .bank-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .bank-val { font-weight: bold; color: #0f172a; }
        
        .btn-copy { 
            background: white; 
            border: 1px solid #cbd5e1; 
            padding: 2px 6px; 
            font-size: 10px; 
            border-radius: 4px; 
            cursor: pointer; 
        }

        .input-group { margin-top: 15px; text-align: left; }
        .input-group label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 6px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; }
        
        .address-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        
        .btn-submit { 
            background: #0f172a; 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: bold; 
            margin-top: 20px; 
            cursor: pointer; 
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15); 
        }
    </style>
</head>
<body>

    <div class="cart-container">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Дэлгүүр рүү буцах</a>
        <h2>🛒 Миний сагс</h2>
        
        <div id="cartItemsList">
            </div>

        <div class="cart-summary">
            <div class="summary-row">
                <span>Барааны нийт үнэ:</span>
                <span id="itemsSubtotal">0₮</span>
            </div>
            <div class="summary-row">
                <span>Хүргэлт:</span>
                <span style="color: #2563eb;">+3,000₮</span>
            </div>
            <div class="summary-total">
                <span>Нийт төлөх дүн:</span>
                <span id="cartGrandTotal">0₮</span>
            </div>
        </div>

        <div class="bank-box">
            <div class="bank-row">
                <span>Банк:</span>
                <span class="bank-val" style="color: #2563eb;">ХХБ (TDB)</span>
            </div>
            <div class="bank-row">
                <span>Данс:</span>
                <div>
                    <span class="bank-val" id="cartBankAcc">428025046</span>
                    <button class="btn-copy" onclick="copyText('cartBankAcc', this)">Хуулах</button>
                </div>
            </div>
            <div class="bank-row">
                <span>Хүлээн авагч:</span>
                <span class="bank-val">Б.Тэмүүжин</span>
            </div>
            <div class="bank-row">
                <span style="color:#ef4444; font-weight:bold;">Гүйлгээний утга:</span>
                <span class="bank-val" id="cartOrderCode" style="color:#ef4444; font-weight: 800;">---</span>
            </div>
        </div>

        <div class="input-group">
            <label>📞 Холбоо барих утас:</label>
            <input type="number" id="cartUserPhone" placeholder="Жишээ: 80252050">
        </div>

        <div class="input-group">
            <label>📍 Хүргэлтийн хаяг:</label>
            <div class="address-grid">
                <input type="text" id="cartAddrDistrict" placeholder="Дүүрэг (БГД...)">
                <input type="text" id="cartAddrKhoroo" placeholder="Хороо (3-р хороо...)">
                <input type="text" id="cartAddrBuilding" placeholder="Байр/Хороолол">
                <input type="text" id="cartAddrDoor" placeholder="Тоот">
            </div>
        </div>

        <div class="input-group">
            <label>📸 Төлбөрийн баримт оруулах:</label>
            <input type="file" id="cartUserReceipt" accept="image/*" style="width: 100%; padding: 8px; border: 2px solid #cbd5e1; border-radius: 8px; background: white;">
        </div>

        <button class="btn-submit" id="btnSubmitCart" onclick="submitCartOrder()">✅ Захиалга илгээх & Төлөх</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7htpIxGtVfJ0HGd7-8DVXtwGwj2mHlOQ",
            authDomain: "temka-shop.firebaseapp.com",
            databaseURL: "https://temka-shop-default-rtdb.firebaseio.com",
            projectId: "temka-shop",
            storageBucket: "temka-shop.firebasestorage.app",
            messagingSenderId: "1057963752042",
            appId: "1:1057963752042:web:9e0c88d308ac1cc9c92813",
            measurementId: "G-9H3NQML5TV"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        // Telegram Бот тохиргоо
        const TG_BOT_TOKEN = "8791135920:AAEP7B1oC3e4cYbUT3ThHxH6QmHanMzsbdU"; 
        const TG_CHAT_ID = "6759790987"; 

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let grandTotal = 0;

        window.onload = function() {
            renderCart();
            var randomCode = "TE-" + Math.floor(1000 + Math.random() * 9000);
            document.getElementById("cartOrderCode").innerText = randomCode;
        };

        function renderCart() {
            const listDiv = document.getElementById("cartItemsList");
            listDiv.innerHTML = "";
            let subtotal = 0;

            if (cart.length === 0) {
                listDiv.innerHTML = "<p style='color:#64748b; text-align:center; padding: 20px 0;'>Сагс хоосон байна.</p>";
                document.getElementById("itemsSubtotal").innerText = "0₮";
                document.getElementById("cartGrandTotal").innerText = "0₮";
                return;
            }

            cart.forEach((item, index) => {
                subtotal += item.price * item.quantity;
                const row = document.createElement("div");
                row.className = "cart-item";
                row.innerHTML = `
                    <img src="${item.image || 'https://via.placeholder.com/50'}" alt="">
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">${(item.price * item.quantity).toLocaleString()}₮</div>
                    </div>
                    <div class="quantity-control">
                        <button class="qty-btn" onclick="changeQty(${index}, -1)">-</button>
                        <span>${item.quantity}</span>
                        <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
                    </div>
                    <button class="btn-remove" onclick="removeItem(${index})"><i class="fa-solid fa-trash"></i></button>
                `;
                listDiv.appendChild(row);
            });

            grandTotal = subtotal + 3000;
            document.getElementById("itemsSubtotal").innerText = subtotal.toLocaleString() + "₮";
            document.getElementById("cartGrandTotal").innerText = grandTotal.toLocaleString() + "₮";
        }

        function changeQty(index, amount) {
            cart[index].quantity += amount;
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function submitCartOrder() {
            var phoneInput = document.getElementById("cartUserPhone").value.trim();
            var orderCode = document.getElementById("cartOrderCode").innerText;
            var receiptInput = document.getElementById("cartUserReceipt");
            
            var district = document.getElementById("cartAddrDistrict").value.trim();
            var khoroo = document.getElementById("cartAddrKhoroo").value.trim();
            var building = document.getElementById("cartAddrBuilding").value.trim();
            var door = document.getElementById("cartAddrDoor").value.trim();

            if (cart.length === 0) {
                alert("Сагс хоосон байна!");
                return;
            }

            if (!phoneInput || phoneInput.length < 6) {
                alert("Захиалга баталгаажуулахын тулд утасны дугаараа зөв оруулна уу!");
                return;
            }

            if (!district || !khoroo || !building || !door) {
                alert("Хүргэлтийн хаягаа бүрэн оруулна уу!");
                return;
            }

            if (!receiptInput.files || receiptInput.files.length === 0) {
                alert("Төлбөр төлсөн баримтын зургаа оруулна уу!");
                return;
            }

            var file = receiptInput.files[0];
            var fullAddress = district + ", " + khoroo + ", " + building + ", " + door;

            // Сагсанд байгаа бараануудыг текст болгох
            var productsText = "";
            var simpleProductsName = ""; 
            
            cart.forEach((item, index) => {
                productsText += " - " + item.name + " (" + item.quantity + "ш)\n";
                simpleProductsName += item.name + (index < cart.length - 1 ? ", " : "");
            });

            var textMessage = "🔔 ШИНЭ САГСНЫ ЗАХИАЛГА ИРЛЭЭ!\n\n📞 Утас: " + phoneInput + "\n📦 Захиалсан бараанууд:\n" + productsText + "\n📍 Хаяг: " + fullAddress + "\n💰 Нийт дүн: " + grandTotal.toLocaleString() + "₮\n🔢 Гүйлгээний утга: " + orderCode;

            var formData = new FormData();
            formData.append("chat_id", TG_CHAT_ID);
            formData.append("photo", file);
            formData.append("caption", textMessage);

            var submitBtn = document.getElementById("btnSubmitCart");
            submitBtn.innerText = "Илгээж байна...";
            submitBtn.disabled = true;

            fetch("https://api.telegram.org/bot" + TG_BOT_TOKEN + "/sendPhoto", {
                method: "POST",
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if(data.ok) {
                    // 1. Firebase "orders" хэсэгт захиалгыг бүртгэх
                    database.ref('orders').push({ 
                        phone: phoneInput, 
                        productName: "[Сагснаас] " + simpleProductsName, 
                        address: fullAddress,
                        orderCode: orderCode, 
                        timestamp: Date.now() 
                    }).then(() => {
                        
                        // 2. СТАТИСТИКИЙН ТООГ ШУУД НЭМЭХ НАЙДВАРТАЙ АРГА (БҮХ БАРААГ Firebase-ээс шүүнэ)
                        database.ref('products').once('value', function(snapshot) {
                            if (snapshot.exists()) {
                                snapshot.forEach(function(childSnapshot) {
                                    var prodId = childSnapshot.key;
                                    var prodData = childSnapshot.val();
                                    
                                    cart.forEach(item => {
                                        // Барааны нэрийг том жижиг үсэг, хоосон зай хамаарахгүй тулгах
                                        if (prodData.name && item.name && 
                                            prodData.name.toLowerCase().trim() === item.name.toLowerCase().trim()) {
                                            
                                            var currentOrders = parseInt(prodData.orders || 0);
                                            var itemQty = parseInt(item.quantity || 1);
                                            
                                            // Нийт захиалгын тоог нэмэх
                                            database.ref('products/' + prodId + '/orders').set(currentOrders + itemQty);
                                        }
                                    });
                                });
                            }
                        });

                        alert("Захиалга амжилттай бүртгэгдлээ! 👍\n\nСагсан дахь захиалга орж, статистикийн тоо нэмэгдлээ.");
                        localStorage.removeItem('cart'); // Сагсыг цэвэрлэх
                        window.location.href = "index.html"; 
                    }).catch(fbErr => {
                        alert("Firebase алдаа: " + fbErr.message);
                    });
                } else {
                    alert("Алдаа: Бот руу мэдээлэл илгээж чадсангүй.");
                }
            })
            .catch(err => {
                alert("Холболтын алдаа: " + err.message);
            })
            .finally(() => {
                submitBtn.innerText = "✅ Захиалга илгээх & Төлөх";
                submitBtn.disabled = false;
            });
        }

        function copyText(id, btn) {
            navigator.clipboard.writeText(document.getElementById(id).innerText).then(function() {
                var txt = btn.innerText;
                btn.innerText = "Хуулагдлаа!";
                setTimeout(function() { btn.innerText = txt; }, 2000);
            });
        }
    </script>
</body>
</html>
