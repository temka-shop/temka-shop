<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEMKA SHOPP - Манай дэлгүүрт тавтай морил</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            background-color: #1a252f;
            color: white;
            width: 100%;
            max-width: 1200px;
            text-align: center;
            padding: 20px 0;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .product-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1200px;
            padding: 20px 0;
        }
        .product-card {
            background-color: white;
            border: 1px solid #e1e8ed;
            padding: 20px;
            width: 260px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }
        .product-title {
            font-size: 16px;
            margin: 15px 0 10px 0;
            color: #333;
        }
        .product-price {
            font-weight: bold;
            color: #e44d26;
            font-size: 18px;
            margin: 10px 0;
        }
        .btn-buy {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            width: 100%;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-buy:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>TEMKA SHOPP</h1>
        <p>Манай дэлгүүрт тавтай морил</p>
    </div>

    <h2>Бүтээгдэхүүнүүд</h2>

    <div class="product-container" id="homeProductGrid">
    </div>

    <script>
        // Нүүр хуудас ачаалагдахад админаас нэмсэн бараануудыг унших
        window.onload = function() {
            var grid = document.getElementById("homeProductGrid");
            var products = JSON.parse(localStorage.getItem("shop_products")) || [];

            if (products.length === 0) {
                grid.innerHTML = "<p style='color:#888; font-size:16px;'>Одоогоор бараа байхгүй байна.</p>";
                return;
            }

            grid.innerHTML = ""; 
            
            products.forEach(function(prod) {
                var card = document.createElement("div");
                card.className = "product-card";
                
                card.innerHTML = `
                    <img src="${prod.image}" alt="${prod.name}">
                    <h3 class="product-title">${prod.name}</h3>
                    <p class="product-price">${prod.price}</p>
                    <button class="btn-buy">Сагсанд хийх</button>
                `;
                grid.appendChild(card);
            });
        };
    </script>

</body>
</html>
